<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Detection</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; text-align: center; }
        h2 { padding: 16px; color: #00f588; }
        #videoEl { width: 100%; max-width: 640px; border-radius: 12px; }
        #canvas { display: none; }
        .result-box {
            background: #1e1e1e; margin: 16px auto;
            max-width: 640px; border-radius: 12px; padding: 16px;
        }
        .coins { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin: 12px 0; }
        .coin { background: #2a2a2a; border-radius: 8px; padding: 12px 20px; }
        .coin-val { font-size: 24px; font-weight: bold; color: #00f588; }
        .coin-label { font-size: 12px; color: #888; }
        .total { font-size: 28px; font-weight: bold; color: #ffb800; margin-top: 12px; }
        #resultImg { width: 100%; max-width: 640px; border-radius: 12px; margin-top: 12px; }
    </style>
</head>
<body>
    <h2>🪙 COINSCAN</h2>

    <video id="videoEl" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <div class="result-box">
        <div class="coins">
            <div class="coin">
                <div class="coin-val" id="c1">0</div>
                <div class="coin-label">1 บาท</div>
            </div>
            <div class="coin">
                <div class="coin-val" id="c2">0</div>
                <div class="coin-label">2 บาท</div>
            </div>
            <div class="coin">
                <div class="coin-val" id="c5">0</div>
                <div class="coin-label">5 บาท</div>
            </div>
            <div class="coin">
                <div class="coin-val" id="c10">0</div>
                <div class="coin-label">10 บาท</div>
            </div>
        </div>
        <div class="total" id="total">💰 รวม: 0 บาท</div>
    </div>

    <img id="resultImg" src="" alt="ผลการตรวจจับ">

<script>
const video = document.getElementById('videoEl');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// เปิดกล้องมือถือ
navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
    .then(stream => { video.srcObject = stream; })
    .catch(err => { alert('ไม่สามารถเปิดกล้องได้: ' + err); });

// ส่งรูปไป detect ทุก 1 วินาที
setInterval(() => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);

    canvas.toBlob(blob => {
        const formData = new FormData();
        formData.append('image', blob, 'frame.jpg');

        fetch('/mobile-detect/', {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById('c1').textContent = data.count['1'] || 0;
            document.getElementById('c2').textContent = data.count['2'] || 0;
            document.getElementById('c5').textContent = data.count['5'] || 0;
            document.getElementById('c10').textContent = data.count['10'] || 0;
            document.getElementById('total').textContent = '💰 รวม: ' + data.total + ' บาท';
            document.getElementById('resultImg').src = 'data:image/jpeg;base64,' + data.image;
        });
    }, 'image/jpeg');
}, 1000);
</script>
</body>
</html>
